version: "3.7"

services:
  app_proxy:
    image: getumbrel/app-proxy:v1.2.0
    environment:
      APP_HOST: web
      APP_PORT: 80
    restart: unless-stopped
    depends_on:
      - web

  node:
    image: ghcr.io/bitcoincashii/forge-pool-node:latest
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/node:/root/.bch2
    command:
      - -printtoconsole
      - -prune=1000
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=forge
      - -rpcpassword=forgepool123

  postgres:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forgepool123
      POSTGRES_DB: forgepool
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
      - ${APP_DIR}/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/redis:/data

  api:
    image: ghcr.io/bitcoincashii/forge-pool-api:latest
    restart: unless-stopped
    depends_on:
      - node
      - postgres
      - redis
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=forge
      - DB_PASSWORD=forgepool123
      - DB_NAME=forgepool
      - REDIS_URL=redis://redis:6379
      - RPC_HOST=node
      - RPC_PORT=8332
      - RPC_USER=forge
      - RPC_PASSWORD=forgepool123

  stratum:
    image: ghcr.io/bitcoincashii/forge-pool-stratum:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3333:3333"
    environment:
      - API_URL=http://api:8080
      - RPC_HOST=node
      - RPC_PORT=8332
      - RPC_USER=forge
      - RPC_PASSWORD=forgepool123

  web:
    image: ghcr.io/bitcoincashii/forge-pool-web:latest
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_URL=http://api:8080
