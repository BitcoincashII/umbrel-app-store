version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bch2-apps-forge-pool_web_1
      APP_PORT: 80

  node:
    image: ghcr.io/bitcoincashii/forge-pool-node:latest
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/node:/root/.bch2
    command:
      - -printtoconsole
      - -prune=1000
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=forge
      - -rpcpassword=forgepool123

  postgres:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forgepool123
      POSTGRES_DB: forgepool
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/redis:/data

  api:
    image: ghcr.io/bitcoincashii/forge-pool-api:latest
    restart: unless-stopped
    depends_on:
      - node
      - postgres
      - redis
    environment:
      - DB_HOST=bch2-apps-forge-pool_postgres_1
      - DB_PORT=5432
      - DB_USER=forge
      - DB_PASSWORD=forgepool123
      - DB_NAME=forgepool
      - REDIS_URL=redis://bch2-apps-forge-pool_redis_1:6379
      - RPC_HOST=bch2-apps-forge-pool_node_1
      - RPC_PORT=8332
      - RPC_USER=forge
      - RPC_PASSWORD=forgepool123

  stratum:
    image: ghcr.io/bitcoincashii/forge-pool-stratum:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3333:3333"
    environment:
      - API_URL=http://bch2-apps-forge-pool_api_1:8080
      - RPC_HOST=bch2-apps-forge-pool_node_1
      - RPC_PORT=8332
      - RPC_USER=forge
      - RPC_PASSWORD=forgepool123

  web:
    image: ghcr.io/bitcoincashii/forge-pool-web:latest
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_URL=http://bch2-apps-forge-pool_api_1:8080
