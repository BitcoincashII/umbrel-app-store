version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bch2-apps-forge-pool_web_1
      APP_PORT: 80

  node:
    image: ghcr.io/bitcoincashii/forge-pool-node@sha256:e2938ce3cadd31711bbb20c05f92ccb6a87e83cd64d42cf0a905fba8c59c6471
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/node:/root/.bch2
    command:
      - -printtoconsole
      - -prune=550
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=umbrel
      - -rpcpassword=moneyprintergobrrr

  postgres:
    image: timescale/timescaledb@sha256:b26180320dea45a27190318903f63cc2839f190315663a53b6429a937dd02196
    restart: on-failure
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: moneyprintergobrrr
      POSTGRES_DB: forgepool
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
      - ${APP_DIR}/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  redis:
    image: redis@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/redis:/data

  api:
    image: ghcr.io/bitcoincashii/forge-pool-api@sha256:12eb68902405029a2a126d6c7865d6f14d871fae2ba01c6091db893560ceec69
    restart: on-failure
    depends_on:
      - node
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: forge
      DB_PASSWORD: moneyprintergobrrr
      DB_NAME: forgepool
      REDIS_URL: redis://redis:6379
      RPC_HOST: node
      RPC_PORT: "8332"
      RPC_USER: umbrel
      RPC_PASSWORD: moneyprintergobrrr

  stratum:
    image: ghcr.io/bitcoincashii/forge-pool-stratum@sha256:534a21118474221b816f61cfbf0b6269a48f1b5934574320fca94cd9bcdf2af8
    restart: on-failure
    depends_on:
      - api
      - node
    ports:
      - "3333:3333"
    environment:
      API_URL: http://api:8080
      RPC_HOST: node
      RPC_PORT: "8332"
      RPC_USER: umbrel
      RPC_PASSWORD: moneyprintergobrrr

  web:
    image: ghcr.io/bitcoincashii/forge-pool-web@sha256:666bcb21c5a9e96cc562ea43285d9b03f6041e3238c53317e6e9db90c06d9906
    restart: on-failure
    depends_on:
      - api
    environment:
      API_URL: http://api:8080
