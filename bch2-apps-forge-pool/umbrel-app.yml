manifestVersion: 1
id: bch2-apps-forge-pool
name: Forge Pool
tagline: Self-hosted BCH2 mining pool
icon: https://hashforge.bch2.org/static/logo.png
category: bitcoin
version: "1.0.5"
port: 80
description: >-
  Run your own BCH2 mining pool with a single click. Forge Pool includes
  everything you need: a full BCH2 node, stratum server, and web dashboard.
  Point your miners at your Umbrel and start mining to your own pool.

  Features:
  - Built-in BCH2 node (auto-syncs on first run)
  - Solo and PPLNS mining modes
  - Real-time hashrate and earnings dashboard
  - Automatic payouts
  - Variable difficulty (vardiff)
  - Mobile-friendly web interface

developer: BCH2 Team
website: https://hashforge.bch2.org
submitter: BCH2 Team
submission: https://github.com/BitcoincashII/umbrel-app-store
repo: https://github.com/BitcoincashII/forge-pool-umbrel
support: https://github.com/BitcoincashII/forge-pool-umbrel/issues
gallery: []

releaseNotes: >-
  Version 1.0.4:
  - Fixed app installation issues
  - Pinned image digests for stability
  - Pruned node by default (~550MB)
  - Built-in stratum on port 3333

dependencies: []

